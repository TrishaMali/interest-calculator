<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator</title>
    <script src="https://www.gstatic.com/firebasejs/compat/app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/compat/firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/compat/auth.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 900px; margin: 0 auto; overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px; text-align: center; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { font-size: 1.1rem; opacity: 0.9; }
        .auth-info { background: rgba(0,0,0,0.1); padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 0.95rem; }
        .content { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 40px; }
        .input-section h2 { color: #667eea; margin-bottom: 25px; font-size: 1.5rem; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; }
        .input-group input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(102,126,234,0.4); }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-secondary:hover { background: #d0d0d0; }
        .btn-danger { background: #ff6b6b; color: white; }
        .btn-danger:hover { background: #ff5252; }
        .results-section h2 { color: #667eea; margin-bottom: 25px; font-size: 1.5rem; }
        .result-card { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-radius: 12px; padding: 20px; margin-bottom: 15px; color: white; }
        .result-card.card-2 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .result-card.card-3 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .result-card h3 { font-size: 0.9rem; opacity: 0.9; margin-bottom: 8px; text-transform: uppercase; }
        .result-value { font-size: 2rem; font-weight: 700; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .modal-content h2 { color: #667eea; margin-bottom: 20px; text-align: center; }
        .modal-input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; margin-bottom: 15px; }
        .modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .modal-btn { padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .modal-btn.primary { background: #667eea; color: white; }
        .modal-btn.secondary { background: #e0e0e0; color: #333; }
        .toast { display: none; position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; background: #667eea; color: white; border-radius: 8px; z-index: 2000; }
        .toast.active { display: block; }
        .toast.success { background: #43e97b; }
        .toast.error { background: #ff6b6b; }
        .history-item { background: #f8f9ff; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #667eea; }
        .history-item-title { font-weight: 600; color: #333; margin-bottom: 5px; }
        .history-item-value { color: #667eea; font-weight: 700; }
        .history-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .history-buttons button { padding: 6px 12px; font-size: 0.85rem; border: none; border-radius: 5px; cursor: pointer; }
        @media (max-width: 768px) { .content { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Compound Interest Calculator</h1>
            <p>Calculate your wealth growth with compound interest</p>
            <div class="auth-info">
                <div id="authStatus">Not logged in</div>
                <button class="btn btn-secondary" id="authBtn" onclick="openAuthModal()">🔐 Login</button>
            </div>
        </div>

        <div class="content">
            <!-- Input Section -->
            <div class="input-section">
                <h2>Investment Details</h2>

                <div class="input-group">
                    <label>Initial Amount (₹)</label>
                    <input type="number" id="initialAmount" value="100000" min="0" step="1000">
                </div>

                <div class="input-group">
                    <label>Monthly Investment (₹)</label>
                    <input type="number" id="monthlyInvestment" value="5000" min="0" step="1000">
                </div>

                <div class="input-group">
                    <label>Annual Return (%)</label>
                    <input type="number" id="annualReturn" value="12" min="0" max="100" step="0.1">
                </div>

                <div class="input-group">
                    <label>Duration (Years)</label>
                    <input type="number" id="duration" value="20" min="1" step="1">
                </div>

                <button class="btn btn-primary" onclick="calculate()">Calculate</button>
                <button class="btn btn-primary" id="saveBtn" onclick="openSaveModal()" style="display:none;">💾 Save to Firestore</button>
                <button class="btn btn-danger" id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
            </div>

            <!-- Results Section -->
            <div class="results-section">
                <h2>Your Results</h2>

                <div class="result-card">
                    <h3>Total Amount Invested</h3>
                    <div class="result-value" id="resultInvested">₹0</div>
                </div>

                <div class="result-card card-2">
                    <h3>Interest Earned</h3>
                    <div class="result-value" id="resultInterest">₹0</div>
                </div>

                <div class="result-card card-3">
                    <h3>Final Portfolio Value</h3>
                    <div class="result-value" id="resultFinal">₹0</div>
                </div>

                <h3 style="color: #667eea; margin-top: 30px;">Saved Calculations</h3>
                <div id="historyList" style="max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2>Login / Sign Up</h2>
            <input type="email" id="email" class="modal-input" placeholder="Email" autocomplete="email">
            <input type="password" id="password" class="modal-input" placeholder="Password" autocomplete="current-password">
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="login()">Login</button>
                <button class="modal-btn primary" onclick="signup()">Sign Up</button>
            </div>
            <button class="modal-btn secondary" onclick="closeAuthModal()" style="width: 100%; margin-top: 10px;">Close</button>
        </div>
    </div>

    <!-- Save Modal -->
    <div id="saveModal" class="modal">
        <div class="modal-content">
            <h2>Save Calculation</h2>
            <input type="text" id="saveName" class="modal-input" placeholder="e.g., Retirement Plan">
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="saveToFirestore()">Save</button>
                <button class="modal-btn secondary" onclick="closeSaveModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCb_V7WGMkkPkhMCfXqfTm5Wf-4yyqc2tA",
            authDomain: "expensetracker7-15c2a.firebaseapp.com",
            projectId: "expensetracker7-15c2a",
            storageBucket: "expensetracker7-15c2a.firebasestorage.app",
            messagingSenderId: "1037918445507",
            appId: "1:1037918445507:web:e43764d4e7a695ecf66776"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let lastCalculation = null;

        // Check auth state
        auth.onAuthStateChanged(user => {
            currentUser = user;
            updateUI();
            if (user) loadHistory();
        });

        function updateUI() {
            const status = document.getElementById('authStatus');
            const saveBtn = document.getElementById('saveBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const authBtn = document.getElementById('authBtn');

            if (currentUser) {
                status.textContent = `Logged in as: ${currentUser.email}`;
                saveBtn.style.display = 'block';
                logoutBtn.style.display = 'block';
                authBtn.style.display = 'none';
            } else {
                status.textContent = 'Not logged in';
                saveBtn.style.display = 'none';
                logoutBtn.style.display = 'none';
                authBtn.style.display = 'block';
            }
        }

        function openAuthModal() {
            document.getElementById('authModal').classList.add('active');
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('active');
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }

        function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                toast('Please enter email and password', 'error');
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    toast('✅ Logged in!', 'success');
                    closeAuthModal();
                })
                .catch(err => toast(err.message, 'error'));
        }

        function signup() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                toast('Please enter email and password', 'error');
                return;
            }

            if (password.length < 6) {
                toast('Password must be at least 6 characters', 'error');
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then(() => {
                    toast('✅ Account created!', 'success');
                    closeAuthModal();
                })
                .catch(err => toast(err.message, 'error'));
        }

        function logout() {
            auth.signOut().then(() => {
                toast('👋 Logged out', 'success');
            });
        }

        function calculate() {
            const initial = parseFloat(document.getElementById('initialAmount').value) || 0;
            const monthly = parseFloat(document.getElementById('monthlyInvestment').value) || 0;
            const rate = parseFloat(document.getElementById('annualReturn').value) || 0;
            const years = parseFloat(document.getElementById('duration').value) || 0;

            const totalInvested = initial + (monthly * 12 * years);
            const monthlyRate = rate / 100 / 12;

            const lumpSumFV = initial * Math.pow(1 + monthlyRate, years * 12);
            let monthlyFV = 0;

            if (monthlyRate === 0) {
                monthlyFV = monthly * 12 * years;
            } else {
                monthlyFV = monthly * (Math.pow(1 + monthlyRate, years * 12) - 1) / monthlyRate;
            }

            const finalValue = lumpSumFV + monthlyFV;
            const interest = finalValue - totalInvested;

            lastCalculation = {
                initial, monthly, rate, years,
                totalInvested, interest, finalValue
            };

            document.getElementById('resultInvested').textContent = '₹' + totalInvested.toLocaleString('en-IN');
            document.getElementById('resultInterest').textContent = '₹' + interest.toLocaleString('en-IN');
            document.getElementById('resultFinal').textContent = '₹' + finalValue.toLocaleString('en-IN');
        }

        function openSaveModal() {
            if (!currentUser) {
                toast('Please login first', 'error');
                return;
            }
            document.getElementById('saveModal').classList.add('active');
        }

        function closeSaveModal() {
            document.getElementById('saveModal').classList.remove('active');
            document.getElementById('saveName').value = '';
        }

        function saveToFirestore() {
            const name = document.getElementById('saveName').value.trim();

            if (!name) {
                toast('Please enter a name', 'error');
                return;
            }

            if (!currentUser) {
                toast('Not logged in', 'error');
                return;
            }

            console.log('Saving to Firestore:', { name, ...lastCalculation });

            db.collection('users').doc(currentUser.uid).collection('calculations').add({
                name,
                ...lastCalculation,
                timestamp: firebase.firestore.Timestamp.now()
            })
            .then(() => {
                toast('✅ Saved to Firestore!', 'success');
                closeSaveModal();
                loadHistory();
            })
            .catch(err => {
                console.error('Save error:', err);
                toast('Error: ' + err.message, 'error');
            });
        }

        function loadHistory() {
            if (!currentUser) {
                document.getElementById('historyList').innerHTML = '';
                return;
            }

            db.collection('users').doc(currentUser.uid).collection('calculations')
                .orderBy('timestamp', 'desc')
                .onSnapshot(snapshot => {
                    const list = document.getElementById('historyList');
                    list.innerHTML = '';

                    if (snapshot.empty) {
                        list.innerHTML = '<p style="color: #999;">No saved calculations</p>';
                        return;
                    }

                    snapshot.forEach(doc => {
                        const calc = doc.data();
                        const item = document.createElement('div');
                        item.className = 'history-item';
                        item.innerHTML = `
                            <div class="history-item-title">${calc.name}</div>
                            <div style="font-size: 0.9rem; color: #666; margin-bottom: 8px;">
                                Initial: ₹${calc.totalInvested.toLocaleString('en-IN')} | Final: <strong>₹${calc.finalValue.toLocaleString('en-IN')}</strong>
                            </div>
                            <div class="history-buttons">
                                <button class="btn btn-secondary" onclick="loadCalculation(${calc.initial}, ${calc.monthly}, ${calc.rate}, ${calc.years})" style="padding: 6px 12px; width: auto;">Load</button>
                                <button class="btn btn-danger" onclick="deleteCalculation('${doc.id}')" style="padding: 6px 12px; width: auto;">Delete</button>
                            </div>
                        `;
                        list.appendChild(item);
                    });
                });
        }

        function loadCalculation(initial, monthly, rate, years) {
            document.getElementById('initialAmount').value = initial;
            document.getElementById('monthlyInvestment').value = monthly;
            document.getElementById('annualReturn').value = rate;
            document.getElementById('duration').value = years;
            calculate();
            toast('✅ Calculation loaded!', 'success');
        }

        function deleteCalculation(docId) {
            if (!confirm('Delete this calculation?')) return;

            db.collection('users').doc(currentUser.uid).collection('calculations').doc(docId).delete()
                .then(() => {
                    toast('✅ Deleted!', 'success');
                    loadHistory();
                })
                .catch(err => toast('Error: ' + err.message, 'error'));
        }

        function toast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast active ' + type;
            setTimeout(() => t.classList.remove('active'), 3000);
        }

        // Click outside modal to close
        window.onclick = function(event) {
            const authModal = document.getElementById('authModal');
            const saveModal = document.getElementById('saveModal');
            if (event.target === authModal) closeAuthModal();
            if (event.target === saveModal) closeSaveModal();
        }

        // Enter key on inputs
        document.getElementById('initialAmount').addEventListener('keypress', e => { if(e.key==='Enter') calculate(); });
        document.getElementById('monthlyInvestment').addEventListener('keypress', e => { if(e.key==='Enter') calculate(); });
        document.getElementById('annualReturn').addEventListener('keypress', e => { if(e.key==='Enter') calculate(); });
        document.getElementById('duration').addEventListener('keypress', e => { if(e.key==='Enter') calculate(); });

        // Initial calculation
        calculate();
    </script>
</body>
</html>
