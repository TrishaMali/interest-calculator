<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compound Interest Calculator</title>
    <script src="https://www.gstatic.com/firebasejs/compat/app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/compat/auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/compat/firestore.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { background: white; border-radius: 15px; max-width: 1000px; margin: 0 auto; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }

        .auth-box { background: #f5f5f5; padding: 20px; border-bottom: 2px solid #e0e0e0; }
        .auth-box input { padding: 12px; border: 2px solid #667eea; border-radius: 8px; width: 40%; font-size: 1rem; }
        .auth-box button { padding: 12px 30px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-left: 10px; }
        .auth-box button:hover { background: #764ba2; }
        .logout-btn { background: #ff6b6b; }
        .logout-btn:hover { background: #ff5252; }
        .user-info { color: #667eea; font-weight: 600; margin-top: 10px; }

        .content { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 40px; }
        .section h2 { color: #667eea; margin-bottom: 20px; font-size: 1.3rem; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; color: #333; font-weight: 600; }
        .input-group input { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; }
        .input-group input:focus { outline: none; border-color: #667eea; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { opacity: 0.9; }

        .result-card { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); border-radius: 12px; padding: 20px; margin-bottom: 15px; color: white; }
        .result-card.card-2 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .result-card.card-3 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .result-card h3 { font-size: 0.85rem; opacity: 0.9; margin-bottom: 10px; }
        .result-value { font-size: 2rem; font-weight: 700; }

        .history { margin-top: 30px; padding: 20px; background: #f8f9ff; border-radius: 12px; max-height: 400px; overflow-y: auto; display: none; }
        .history.show { display: block; }
        .history h3 { color: #667eea; margin-bottom: 15px; }
        .history-item { background: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #667eea; }
        .history-item-name { font-weight: 600; }
        .history-item-value { color: #667eea; font-weight: 700; margin: 5px 0; }
        .history-btns { display: flex; gap: 5px; margin-top: 8px; }
        .history-btns button { padding: 5px 12px; font-size: 0.8rem; border: none; border-radius: 4px; cursor: pointer; }
        .load-btn { background: #667eea; color: white; }
        .delete-btn { background: #ff6b6b; color: white; }

        .toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; background: #667eea; color: white; border-radius: 8px; z-index: 1000; display: none; }
        .toast.show { display: block; }
        .toast.success { background: #43e97b; }
        .toast.error { background: #ff6b6b; }

        @media (max-width: 768px) { .content { grid-template-columns: 1fr; } .auth-box input { width: 100%; } .auth-box button { margin-left: 0; margin-top: 10px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Compound Interest Calculator</h1>
            <p>Calculate your wealth growth with compound interest</p>
        </div>

        <div class="auth-box">
            <input type="email" id="emailInput" placeholder="Enter your email" autocomplete="email">
            <button onclick="login()">Sign In</button>
            <button class="logout-btn" id="logoutBtn" onclick="logout()" style="display: none;">Logout</button>
            <div class="user-info" id="userInfo"></div>
        </div>

        <div class="content">
            <!-- Input Section -->
            <div class="section">
                <h2>Investment Details</h2>

                <div class="input-group">
                    <label>Initial Amount (₹)</label>
                    <input type="number" id="initial" value="100000" min="0" step="1000" oninput="calculate()">
                </div>

                <div class="input-group">
                    <label>Monthly Investment (₹)</label>
                    <input type="number" id="monthly" value="5000" min="0" step="1000" oninput="calculate()">
                </div>

                <div class="input-group">
                    <label>Expected Annual Return (%)</label>
                    <input type="number" id="return" value="12" min="0" max="100" step="0.1" oninput="calculate()">
                </div>

                <div class="input-group">
                    <label>Investment Duration (Years)</label>
                    <input type="number" id="years" value="20" min="1" step="1" oninput="calculate()">
                </div>

                <button class="btn btn-primary" onclick="calculate()">Calculate</button>
                <button class="btn btn-primary" id="saveBtn" onclick="saveCalculation()" style="display: none;">💾 Save to Firebase</button>

                <div class="history" id="history">
                    <h3>📊 Your Saved Calculations</h3>
                    <div id="historyList"></div>
                </div>
            </div>

            <!-- Results Section -->
            <div class="section">
                <h2>Your Results</h2>

                <div class="result-card">
                    <h3>Total Amount Invested</h3>
                    <div class="result-value" id="resultInvested">₹0</div>
                </div>

                <div class="result-card card-2">
                    <h3>Interest Earned</h3>
                    <div class="result-value" id="resultInterest">₹0</div>
                </div>

                <div class="result-card card-3">
                    <h3>Final Portfolio Value</h3>
                    <div class="result-value" id="resultFinal">₹0</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCb_V7WGMkkPkhMCfXqfTm5Wf-4yyqc2tA",
            authDomain: "expensetracker7-15c2a.firebaseapp.com",
            projectId: "expensetracker7-15c2a",
            storageBucket: "expensetracker7-15c2a.firebasestorage.app",
            messagingSenderId: "1037918445507",
            appId: "1:1037918445507:web:e43764d4e7a695ecf66776"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let lastCalculation = null;

        auth.onAuthStateChanged(user => {
            currentUser = user;
            updateUI();
            if (user) loadHistory();
        });

        function updateUI() {
            const emailInput = document.getElementById('emailInput');
            const signinBtn = emailInput.nextElementSibling;
            const logoutBtn = document.getElementById('logoutBtn');
            const userInfo = document.getElementById('userInfo');
            const saveBtn = document.getElementById('saveBtn');
            const history = document.getElementById('history');

            if (currentUser) {
                emailInput.style.display = 'none';
                signinBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                userInfo.textContent = '✅ Logged in as: ' + localStorage.getItem('userEmail');
                saveBtn.style.display = 'block';
                history.classList.add('show');
            } else {
                emailInput.style.display = 'inline-block';
                signinBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                userInfo.textContent = '';
                saveBtn.style.display = 'none';
                history.classList.remove('show');
            }
        }

        function login() {
            const email = document.getElementById('emailInput').value.trim();

            if (!email || !email.includes('@')) {
                showToast('Enter valid email', 'error');
                return;
            }

            auth.signInAnonymously().then(result => {
                localStorage.setItem('userEmail', email);
                localStorage.setItem('userID', result.user.uid);

                db.collection('users').doc(result.user.uid).set({
                    email: email,
                    loginTime: firebase.firestore.Timestamp.now()
                }, { merge: true });

                showToast('✅ Logged in as ' + email, 'success');
                document.getElementById('emailInput').value = '';
            }).catch(err => showToast('Error: ' + err.message, 'error'));
        }

        function logout() {
            auth.signOut();
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userID');
            currentUser = null;
            showToast('Logged out', 'success');
        }

        function calculate() {
            const initial = parseFloat(document.getElementById('initial').value) || 0;
            const monthly = parseFloat(document.getElementById('monthly').value) || 0;
            const returnRate = parseFloat(document.getElementById('return').value) || 0;
            const duration = parseFloat(document.getElementById('years').value) || 0;

            const totalInvested = initial + (monthly * 12 * duration);
            const monthlyRate = returnRate / 100 / 12;

            const lumpSumFV = initial * Math.pow(1 + monthlyRate, duration * 12);
            let monthlyFV = 0;

            if (monthlyRate === 0) {
                monthlyFV = monthly * 12 * duration;
            } else {
                monthlyFV = monthly * (Math.pow(1 + monthlyRate, duration * 12) - 1) / monthlyRate;
            }

            const finalValue = lumpSumFV + monthlyFV;
            const interest = finalValue - totalInvested;

            lastCalculation = {
                initial, monthly, returnRate, duration,
                totalInvested: Math.round(totalInvested),
                interest: Math.round(interest),
                finalValue: Math.round(finalValue)
            };

            document.getElementById('resultInvested').textContent = '₹' + lastCalculation.totalInvested.toLocaleString('en-IN');
            document.getElementById('resultInterest').textContent = '₹' + lastCalculation.interest.toLocaleString('en-IN');
            document.getElementById('resultFinal').textContent = '₹' + lastCalculation.finalValue.toLocaleString('en-IN');
        }

        function saveCalculation() {
            if (!currentUser) {
                showToast('Please sign in', 'error');
                return;
            }

            const name = prompt('Name this calculation:');
            if (!name) return;

            db.collection('users').doc(currentUser.uid).collection('calculations').add({
                name: name,
                ...lastCalculation,
                createdAt: firebase.firestore.Timestamp.now()
            }).then(() => {
                showToast('✅ Saved!', 'success');
                loadHistory();
            }).catch(err => showToast('Error: ' + err.message, 'error'));
        }

        function loadHistory() {
            if (!currentUser) return;

            db.collection('users').doc(currentUser.uid).collection('calculations')
                .orderBy('createdAt', 'desc')
                .onSnapshot(snapshot => {
                    const list = document.getElementById('historyList');
                    list.innerHTML = '';

                    if (snapshot.empty) {
                        list.innerHTML = '<p style="color: #999;">No saved calculations</p>';
                        return;
                    }

                    snapshot.forEach(doc => {
                        const calc = doc.data();
                        const item = document.createElement('div');
                        item.className = 'history-item';
                        item.innerHTML = `
                            <div class="history-item-name">${calc.name}</div>
                            <div class="history-item-value">Final: ₹${calc.finalValue.toLocaleString('en-IN')}</div>
                            <div class="history-btns">
                                <button class="load-btn" onclick="loadCalc(${calc.initial}, ${calc.monthly}, ${calc.returnRate}, ${calc.duration})">Load</button>
                                <button class="delete-btn" onclick="deleteCalc('${doc.id}')">Delete</button>
                            </div>
                        `;
                        list.appendChild(item);
                    });
                });
        }

        function loadCalc(initial, monthly, returnRate, duration) {
            document.getElementById('initial').value = initial;
            document.getElementById('monthly').value = monthly;
            document.getElementById('return').value = returnRate;
            document.getElementById('years').value = duration;
            calculate();
            showToast('✅ Loaded', 'success');
        }

        function deleteCalc(docId) {
            if (!confirm('Delete?')) return;
            db.collection('users').doc(currentUser.uid).collection('calculations').doc(docId).delete()
                .then(() => showToast('✅ Deleted', 'success'))
                .catch(err => showToast('Error', 'error'));
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        calculate();
    </script>
</body>
</html>
